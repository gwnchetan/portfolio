    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/sheryjs/dist/Shery.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <link rel="stylesheet" href="css/style.css?v=2">
    <link rel="stylesheet" href="css/contact.css">
</head>

<body>
    <div id="bg-three" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></div>
    
    <!-- Navbar -->
    <nav id="main-nav">
        <a href="index.html" class="nav-logo">C/</a>
        <ul class="nav-right" id="navRight">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
            <li><button class="mode-toggle" id="modeToggle">⚡ Cyber Mode</button></li>
        </ul>
        <button class="hamburger-menu" id="hamburgerMenu" aria-label="Toggle Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
    </nav>

    <main class="contact-page">
        <div class="contact-container">
            <h1 class="contact-massive-heading">Contact me</h1>
            
            <div class="contact-grid">
                
                <!-- Left Details -->
                <div class="contact-details">
                    <div class="contact-info-block">
                        <h4>Location</h4>
                        <p>Rajkot, Gujarat<br>India</p>
                    </div>
                    
                    <div class="contact-info-block">
                        <h4>Availability</h4>
                        <p>Monday - Friday<br>9:00 AM - 6:00 PM IST</p>
                    </div>
                    
                    <div class="contact-info-block">
                        <h4>Connect</h4>
                        <p><a href="https://github.com/gwnchetan" target="_blank" style="color:inherit;text-decoration:none;">GitHub ↗</a></p>
                        <p><a href="https://www.linkedin.com/in/chandrbhan-sakre-76a40b237/" target="_blank" style="color:inherit;text-decoration:none;">LinkedIn ↗</a></p>
                        <p><a href="https://www.instagram.com/__chetan_sakre__?igsh=MXZsMThnbTJ2M2lteg==" target="_blank" style="color:inherit;text-decoration:none;">Instagram ↗</a></p>
                    </div>
                </div>

                <!-- Right Form -->
                <!-- Right Form -->
                <form class="contact-form" action="https://formsubmit.co/2b320015afd5ae642140343862aa731e" method="POST">
                    
                    <!-- FormSubmit Configuration -->
                    <input type="hidden" name="_subject" value="New Project Inquiry from Portfolio!">
                    <input type="hidden" name="_template" value="box">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Name (required)</label>
                            <input type="text" name="First Name" placeholder="First Name" required>
                        </div>
                        <div class="form-group">
                            <label>&nbsp;</label>
                            <input type="text" name="Last Name" placeholder="Last Name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Service</label>
                        <select name="Service">
                            <option value="" disabled selected>Select a service...</option>
                            <option value="Creative Frontend">Creative Frontend</option>
                            <option value="Full Stack Development">Full Stack Development</option>
                            <option value="Portfolio Site">Portfolio Site</option>
                            <option value="Other">Other</option>
                        </select>
                        <i class="ph ph-caret-down select-arrow"></i>
                    </div>

                    <div class="form-group">
                        <label>Email (required)</label>
                        <input type="email" name="email" placeholder="hello@example.com" required>
                    </div>

                    <div class="form-group">
                        <label>Project description</label>
                        <textarea name="Message" placeholder="Tell me about your project..." rows="3" required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Submit</button>
                    
                </form>

            </div>
        </div>
    </main>

    <!-- Global Premium Footer will be injected here automatically by footer.js -->

    <!-- Scripts -->
    <script src="js/global.js" defer></script>
    <script src="js/footer.js" defer></script>
    <script src="js/main.js?v=2" defer></script>
</body>

</html>
